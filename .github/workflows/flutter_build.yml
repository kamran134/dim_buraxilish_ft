name: Flutter Build (Android + iOS TestFlight)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

# ══════════════════════════════════════════════════════════
# СПИСОК СЕКРЕТОВ (Settings → Secrets and variables → Actions)
#
# Android (4 штуки):
#   ANDROID_KEYSTORE_BASE64     — keystore.jks в base64
#   ANDROID_KEY_ALIAS           — keyAlias
#   ANDROID_KEY_PASSWORD        — keyPassword
#   ANDROID_STORE_PASSWORD      — storePassword
#
# iOS (7 штук):
#   IOS_CERTIFICATE_P12_BASE64       — Distribution cert (.p12) в base64
#   IOS_CERTIFICATE_PASSWORD         — пароль от .p12
#   IOS_PROVISIONING_PROFILE_BASE64  — App Store profile (.mobileprovision) в base64
#   APPLE_TEAM_ID                    — 10-символьный ID команды Apple Developer
#   APP_STORE_CONNECT_KEY_ID         — ID ключа API (App Store Connect)
#   APP_STORE_CONNECT_ISSUER_ID      — Issuer ID (App Store Connect)
#   APP_STORE_CONNECT_KEY_BASE64     — .p8 файл ключа в base64
# ══════════════════════════════════════════════════════════

jobs:

  # ─────────────────────────────────────────────
  # ANDROID — Release APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # iOS — Signed IPA + Upload to TestFlight
  # Запускается только при пуше в master (не на PR)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS + Upload to TestFlight
    runs-on: macos-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Import Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERT_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_NAME=$(security cms -D -i profile.mobileprovision \
            | plutil -extract Name xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')" >> $GITHUB_ENV

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadBitcode</key>
              <false/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.dim.dim_buraxilish</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: flutter build ipa --release

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Save IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30
